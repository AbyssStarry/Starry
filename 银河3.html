<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Observatory - 500万三维螺旋版</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #020b26 0%, #01030a 65%, #000000 100%);
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: rgba(255, 255, 255, 0.85);
            cursor: grab;
        }

        body:active { cursor: grabbing; }

        #webgl-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #curtain.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .init-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            padding: 12px 36px;
            font-size: 11px;
            letter-spacing: 0.8em;
            text-indent: 0.8em;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.5s ease;
        }
        
        .init-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 40px;
            opacity: 0;
            transition: opacity 4s ease 1s;
        }
        #ui-overlay.fade-in { opacity: 1; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            line-height: 2;
            mix-blend-mode: screen;
        }

        .status-panel {
            font-size: 8px;
            font-family: "Courier New", Courier, monospace;
            color: rgba(255, 255, 255, 0.2);
            text-align: right;
            line-height: 2;
            letter-spacing: 0.1em;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.3em;
        }

        #spatial-quotes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .spatial-quote {
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            font-size: 11px;
            letter-spacing: 0.3em;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transition: opacity 1.5s ease;
            white-space: nowrap;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="curtain">
        <button class="init-btn" id="start-btn">渲染 5,000,000 银河尘埃</button>
    </div>

    <div id="ui-overlay">
        <header>
            <div class="title">Stellar Observatory<br>// 极高密度星云点云引擎<br>// 三维旋臂矩阵已重构</div>
            <div class="status-panel" id="status-panel">
                SYS_CORE: ONLINE<br>
                DUST: 5,000,000<br>
                STARS: 15,000<br>
                RA/DEC: 00h 00m / +00°
            </div>
        </header>
        <footer>
            <div>拖拽以巡视全天球 · 寻找遗落的信号</div>
            <div>EXTREME-PC-ENGINE v11.0</div>
        </footer>
    </div>

    <div id="spatial-quotes-container"></div>
    <div id="webgl-container"></div>

    <script>
        const CONFIG = {
            dustCount: 5000000, 
            starCount: 15000,
            maxRadius: 1500,
            interaction: { damping: 0.04 }
        };

        const QUOTES_DATA = [
            { text: "我们仰望的，是百万年前的幻影。", theta: Math.PI * 0.2, phi: 0.1, element: null, position: new THREE.Vector3() },
            { text: "星辰生于尘埃，亦归于尘埃。", theta: Math.PI * 0.8, phi: -0.2, element: null, position: new THREE.Vector3() },
            { text: "宇宙的尽头，是时间的凝固。", theta: Math.PI * 1.5, phi: 0.3, element: null, position: new THREE.Vector3() },
            { text: "孤独，是高级智慧的必经航程。", theta: Math.PI * 1.9, phi: -0.4, element: null, position: new THREE.Vector3() },
            { text: "在这条光河面前，一切烦恼轻如微尘。", theta: Math.PI * 1.1, phi: 0.05, element: null, position: new THREE.Vector3() },
            { text: "给时光以生命，给岁月以文明。", theta: Math.PI * 0.4, phi: -0.1, element: null, position: new THREE.Vector3() },
            { text: "两件东西，头顶的星空与心中的道德律。", theta: Math.PI * 0.6, phi: 0.25, element: null, position: new THREE.Vector3() },
            { text: "我们都是星尘，由恒星爆炸的灰烬铸就。", theta: Math.PI * 1.3, phi: -0.15, element: null, position: new THREE.Vector3() },
            { text: "在浩瀚的宇宙中，我们只是一粒悬浮在阳光下的微尘。", theta: Math.PI * 1.7, phi: 0.1, element: null, position: new THREE.Vector3() },
            { text: "时间是最大的幻觉。", theta: Math.PI * 0.1, phi: -0.3, element: null, position: new THREE.Vector3() },
            { text: "向外的探索，终将引导我们向内审视。", theta: Math.PI * 0.9, phi: 0.35, element: null, position: new THREE.Vector3() },
            { text: "光穿越千万光年来到这里，只为在你的眼中留下倒影。", theta: Math.PI * 1.6, phi: -0.05, element: null, position: new THREE.Vector3() },
            { text: "不要温和地走进那个良夜。", theta: Math.PI * 1.4, phi: 0.4, element: null, position: new THREE.Vector3() },
            { text: "所有的相遇，都是久别重逢。", theta: Math.PI * 0.5, phi: -0.35, element: null, position: new THREE.Vector3() },
            { text: "我们在阴沟里，依然可以仰望星空。", theta: Math.PI * 1.8, phi: 0.2, element: null, position: new THREE.Vector3() }
        ];

        let scene, camera, renderer;
        let instancedMesh, pointCloud;
        let starData = []; 
        
        let targetRotationX = 0, targetRotationY = -Math.PI / 8; 
        let currentRotationX = 0, currentRotationY = 0;
        const FIXED_FOV = 60;

        let isPointerDown = false;
        let pointerX = 0, pointerY = 0;

        const container = document.getElementById('webgl-container');
        const startBtn = document.getElementById('start-btn');
        const statusPanel = document.getElementById('status-panel');
        const quotesContainer = document.getElementById('spatial-quotes-container');

        startBtn.addEventListener('click', () => {
            startBtn.innerHTML = "三维矩阵推演中...";
            startBtn.style.color = "rgba(255, 255, 255, 1)";
            startBtn.style.pointerEvents = "none";
            startBtn.style.borderColor = "rgba(255, 255, 255, 0.8)";

            setTimeout(() => {
                document.getElementById('curtain').classList.add('fade-out');
                document.getElementById('ui-overlay').classList.add('fade-in');
                
                initEngine();
                initTexture();
                initMassiveDustCloud(); 
                initBlinkingStars();    
                initSpatialQuotes();
                initEventListeners();
                animate();
            }, 100);
        });

        let sharedStarTexture;

        function initEngine() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(FIXED_FOV, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.set(0, 0, 0); 
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
            renderer.setClearColor(0x000000, 0); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);
        }

        function initTexture() {
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 32; 
            textureCanvas.height = 32;
            const ctx = textureCanvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.1, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.4, 'rgba(255, 255, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            sharedStarTexture = new THREE.CanvasTexture(textureCanvas);
        }

        // ==========================================
        // 核心修正：对数螺线 + 空间体积推演
        // ==========================================
        function initMassiveDustCloud() {
            const count = CONFIG.dustCount;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            const cr = 1.0, cg = 0.933, cb = 0.867; 
            const ar = 0.867, ag = 0.933, ab = 1.0; 
            
            const maxR = CONFIG.maxRadius;
            const branches = 2; // 银河双主旋臂结构
            const spin = 3.8;   // 旋臂缠绕系数

            let i3 = 0;
            for (let i = 0; i < count; i++) {
                // 半径分布：核心极密，边缘渐稀疏
                const r = maxR * Math.pow(Math.random(), 2.2);
                
                // --- 几何旋臂计算 ---
                const branchAngle = (i % branches) * ((Math.PI * 2) / branches);
                const spinAngle = (r / maxR) * spin;
                // 加入随机扰动，打破绝对线条感，形成云雾
                const scatter = (Math.random() - 0.5) * Math.random() * 0.8 * (1 + r / maxR);
                const finalAngle = branchAngle + spinAngle + scatter;

                // X 和 Z 轴铺设在水平面盘上
                const x = Math.cos(finalAngle) * r;
                const z = Math.sin(finalAngle) * r;

                // --- 极其关键的厚度（Y轴）计算 ---
                // 大幅增加厚度：核心球体厚度高达 500，旋臂边缘基础厚度也有 80
                const coreThickness = 500;
                const edgeThickness = 80;
                // 厚度随半径向外呈抛物线衰减
                const currentThickness = coreThickness * Math.pow(1.0 - (r / maxR), 2) + edgeThickness;
                
                // 将 Y 轴的值正负随机拉开，形成上下鼓起的椭球体
                const yDist = (Math.random() - 0.5) * 2.0; 
                const y = Math.sign(yDist) * Math.pow(Math.abs(yDist), 1.5) * currentThickness;

                positions[i3] = x;
                positions[i3 + 1] = y;
                positions[i3 + 2] = z;

                // --- 颜色渲染 ---
                let brightness = 0.015 + Math.random() * 0.08;
                if (r < maxR * 0.15) brightness += 0.05; // 核心高亮

                const t = r / maxR;
                const rCol = cr + (ar - cr) * t;
                const gCol = cg + (ag - cg) * t;
                const bCol = cb + (ab - cb) * t;

                colors[i3] = rCol * brightness;
                colors[i3 + 1] = gCol * brightness;
                colors[i3 + 2] = bCol * brightness;

                i3 += 3;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.0, 
                map: sharedStarTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                depthWrite: false,
                depthTest: false,
                sizeAttenuation: true 
            });

            pointCloud = new THREE.Points(geometry, material);
            
            // 解决“缩成一条线”的终极手段：使用 Three.js 原生 Object3D 旋转整个星云矩阵
            // 这确保了 Y 轴的厚度体积绝不丢失，完美保留三维流体感
            pointCloud.rotation.x = 35 * (Math.PI / 180);
            pointCloud.rotation.z = -15 * (Math.PI / 180);
            
            scene.add(pointCloud);
        }

        // ==========================================
        // 1.5万颗亮星同步修正坐标与旋转
        // ==========================================
        function initBlinkingStars() {
            const count = CONFIG.starCount;
            const geometry = new THREE.PlaneGeometry(1, 1);
            const material = new THREE.MeshBasicMaterial({
                map: sharedStarTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false
            });

            instancedMesh = new THREE.InstancedMesh(geometry, material, count);
            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            const maxR = CONFIG.maxRadius;
            const branches = 2;
            const spin = 3.8;

            for (let i = 0; i < count; i++) {
                let x, y, z;
                // 让亮星的分布范围比尘埃稍大一些
                const r = 200 + Math.random() * (maxR * 1.2);
                
                if (Math.random() < 0.7) {
                    // 70% 亮星遵循银河盘面的螺旋结构
                    const branchAngle = (i % branches) * ((Math.PI * 2) / branches);
                    const spinAngle = (r / maxR) * spin;
                    const scatter = (Math.random() - 0.5) * 1.5; 
                    const finalAngle = branchAngle + spinAngle + scatter;

                    x = Math.cos(finalAngle) * r;
                    z = Math.sin(finalAngle) * r;

                    const currentThickness = 500 * Math.pow(1.0 - (r / maxR), 2) + 120;
                    const yDist = (Math.random() - 0.5) * 2.0;
                    y = Math.sign(yDist) * Math.pow(Math.abs(yDist), 1.2) * currentThickness;
                } else {
                    // 30% 作为晕星，随机分布在三维球体空间
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }

                dummy.position.set(x, y, z);

                const sizeRand = Math.random();
                let scale, brightness;
                if (sizeRand > 0.9) {
                    scale = 2.0 + Math.random() * 2.5; 
                    brightness = 1.0;
                } else {
                    scale = 0.8 + Math.random() * 1.5;
                    brightness = 0.4 + Math.random() * 0.6;
                }

                dummy.scale.set(scale, scale, scale);
                dummy.lookAt(0, 0, 0);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
                
                color.setHex(0xffffff).multiplyScalar(brightness);
                instancedMesh.setColorAt(i, color);

                starData.push({
                    color: color.clone(),
                    speed: 0.2 + Math.random() * 1.5,
                    phase: Math.random() * Math.PI * 2 
                });
            }

            // 对亮星群施加完全一致的矩阵旋转
            instancedMesh.rotation.x = 35 * (Math.PI / 180);
            instancedMesh.rotation.z = -15 * (Math.PI / 180);

            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
            scene.add(instancedMesh);
        }

        function initSpatialQuotes() {
            const distance = 800; 
            QUOTES_DATA.forEach(q => {
                const x = distance * Math.cos(q.phi) * Math.cos(q.theta);
                const y = distance * Math.sin(q.phi);
                const z = distance * Math.cos(q.phi) * Math.sin(q.theta);
                q.position.set(x, y, z);

                const el = document.createElement('div');
                el.className = 'spatial-quote';
                el.innerText = q.text;
                quotesContainer.appendChild(el);
                q.element = el;
            });
        }

        function initEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            container.addEventListener('pointerdown', (e) => {
                isPointerDown = true;
                pointerX = e.clientX;
                pointerY = e.clientY;
                document.body.style.cursor = 'grabbing';
            });

            container.addEventListener('pointermove', (e) => {
                if (!isPointerDown) return;
                const deltaX = e.clientX - pointerX;
                const deltaY = e.clientY - pointerY;
                
                targetRotationY += deltaX * 0.0015;
                targetRotationX += deltaY * 0.0015;
                
                targetRotationX = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, targetRotationX));
                
                pointerX = e.clientX;
                pointerY = e.clientY;
            });

            const handleUp = () => {
                isPointerDown = false;
                document.body.style.cursor = 'grab';
            };
            window.addEventListener('pointerup', handleUp);
            window.addEventListener('pointercancel', handleUp);
        }

        const clock = new THREE.Clock();
        const workingColor = new THREE.Color();
        const projVector = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            currentRotationX += (targetRotationX - currentRotationX) * CONFIG.interaction.damping;
            currentRotationY += (targetRotationY - currentRotationY) * CONFIG.interaction.damping;
            camera.quaternion.setFromEuler(new THREE.Euler(currentRotationX, currentRotationY, 0, 'YXZ'));

            if (instancedMesh && instancedMesh.instanceColor) {
                for (let i = 0; i < CONFIG.starCount; i++) {
                    const data = starData[i];
                    const twinkle = 0.5 + 0.5 * Math.abs(Math.sin(time * data.speed + data.phase));
                    workingColor.copy(data.color).multiplyScalar(twinkle);
                    instancedMesh.setColorAt(i, workingColor);
                }
                instancedMesh.instanceColor.needsUpdate = true;
            }

            camera.fov = FIXED_FOV;
            camera.updateProjectionMatrix();

            if(Math.abs(targetRotationY - currentRotationY) > 0.0005) {
                const raHours = Math.floor(((currentRotationY % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) / (Math.PI * 2) * 24);
                const raMin = Math.floor(Math.abs(Math.sin(currentRotationY)) * 59);
                const decDeg = Math.floor((currentRotationX / (Math.PI / 2)) * 90);
                statusPanel.innerHTML = `
                    SYS_CORE: SEARCHING<br>
                    TOTAL_PARTICLES: ${(CONFIG.dustCount + CONFIG.starCount).toLocaleString()}<br>
                    RA/DEC: ${raHours.toString().padStart(2, '0')}h ${raMin.toString().padStart(2, '0')}m / ${decDeg >= 0 ? '+' : ''}${decDeg}°
                `;
            }

            QUOTES_DATA.forEach(q => {
                projVector.copy(q.position).project(camera);
                if (projVector.z < 1 && Math.abs(projVector.x) < 0.4 && Math.abs(projVector.y) < 0.4) {
                    q.element.style.opacity = '1';
                } else {
                    q.element.style.opacity = '0';
                }
                const screenX = (projVector.x * 0.5 + 0.5) * window.innerWidth;
                const screenY = (projVector.y * -0.5 + 0.5) * window.innerHeight;
                q.element.style.transform = `translate(-50%, -50%) translate(${screenX}px, ${screenY}px)`;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
