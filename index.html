<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Observatory - 银河微尘</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 保持高阶暗夜蓝调背景 */
            background: radial-gradient(circle at 50% 50%, #031035 0%, #01040f 65%, #000000 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            color: rgba(255, 255, 255, 0.85);
            cursor: grab;
        }

        body:active { cursor: grabbing; }

        #webgl-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000105;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 2.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #curtain.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .init-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 14px 32px;
            font-size: 12px;
            letter-spacing: 0.5em;
            text-indent: 0.5em;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.5s ease;
        }
        
        .init-btn:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            opacity: 0;
            transition: opacity 3s ease 0.5s;
        }

        #ui-overlay.fade-in { opacity: 1; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            line-height: 1.6;
        }

        .status-panel {
            font-size: 9px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            line-height: 1.8;
        }

        #quote-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        .quote-text {
            font-size: 14px;
            letter-spacing: 0.25em;
            line-height: 2.2;
            color: rgba(255, 255, 255, 0.85);
            opacity: 0;
            transition: opacity 2.5s ease, transform 2.5s ease;
            transform: translateY(8px);
        }

        .quote-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.2em;
        }

        @media (max-width: 768px) {
            #ui-overlay { padding: 30px 20px; }
            .quote-text { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="curtain">
        <button class="init-btn" id="start-btn">观测银河微尘</button>
    </div>

    <div id="ui-overlay">
        <header>
            <div class="title">Stellar Observatory<br>// 银河辉光深空版</div>
            <div class="status-panel" id="status-panel">
                SYS.STATUS: ACTIVE<br>
                FOV: 55.00° (LOCKED)<br>
                RA/DEC: 00h 00m / +00°
            </div>
        </header>
        <footer>
            <div>滑动流转全景天穹 · 寻找银河核心</div>
            <div>OPTICAL GLOW v7.0</div>
        </footer>
    </div>

    <div id="quote-container">
        <p class="quote-text" id="quote-element"></p>
    </div>

    <div id="webgl-container"></div>

    <script>
        const CONFIG = {
            stars: {
                // 再次翻倍星体数量！使用 InstancedMesh 仍能保持流畅
                count: window.innerWidth < 768 ? 65000 : 100000,
                minRadius: 250,
                maxRadius: 900
            },
            interaction: {
                damping: 0.05 
            }
        };

        const QUOTES = [
            "“在这条由千亿颗恒星汇聚的光河面前，一切烦恼都轻如尘埃。”",
            "“有两种东西，我对它们的思考越是深沉和持久，它们在我心灵中唤起的惊奇和敬畏就会日新月异，不断增长，这就是我头上的星空和心中的道德律。”",
            "“我们都是星尘。漫天繁星，皆为我们已逝的故亲。”"
        ];

        let scene, camera, renderer, instancedMesh;
        let starData = []; 
        
        let targetRotationX = 0; 
        let targetRotationY = -Math.PI / 8;
        let currentRotationX = 0, currentRotationY = 0;
        const FIXED_FOV = 55;

        let isPointerDown = false;
        let pointerX = 0, pointerY = 0;

        const container = document.getElementById('webgl-container');
        const startBtn = document.getElementById('start-btn');
        const statusPanel = document.getElementById('status-panel');
        const quoteElement = document.getElementById('quote-element');

        startBtn.addEventListener('click', () => {
            document.getElementById('curtain').classList.add('fade-out');
            document.getElementById('ui-overlay').classList.add('fade-in');
            
            initEngine();
            initMilkyWayStars();
            initEventListeners();
            animate();
            
            setTimeout(triggerQuote, 3000);
        });

        function initEngine() {
            scene = new THREE.Scene();
            scene.background = null; 

            camera = new THREE.PerspectiveCamera(FIXED_FOV, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 0); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setClearColor(0x000000, 0); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            container.appendChild(renderer.domElement);
        }

        // ==========================================
        // 构建带有真实辉光和海量微小散点的银河
        // ==========================================
        function initMilkyWayStars() {
            const count = CONFIG.stars.count;

            // 【核心修复】创建光学辉光纹理，彻底消除硬边缘！
            const textureCanvas = document.createElement('canvas');
            textureCanvas.width = 32; 
            textureCanvas.height = 32;
            const ctx = textureCanvas.getContext('2d');
            
            // 使用径向渐变，中心极其明亮，边缘完全透明，彻底遮掩正方形/圆形轮廓
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');     // 刺眼的核心
            gradient.addColorStop(0.1, 'rgba(255, 255, 255, 0.8)');  // 坚实的发光体
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.15)'); // 柔和的光晕过渡
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');      // 边缘完全融入背景
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            const starTexture = new THREE.CanvasTexture(textureCanvas);

            const geometry = new THREE.PlaneGeometry(1, 1);
            
            const material = new THREE.MeshBasicMaterial({
                map: starTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                depthWrite: false,
                depthTest: false
            });

            instancedMesh = new THREE.InstancedMesh(geometry, material, count);
            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            const starColors = [0xffffff, 0xf8fbff, 0xeef5ff, 0xfff9e6];

            for (let i = 0; i < count; i++) {
                let x, y, z;
                const radius = CONFIG.stars.minRadius + Math.random() * (CONFIG.stars.maxRadius - CONFIG.stars.minRadius);

                // 70% 的星星集中在倾斜的银河带
                if (i < count * 0.70) {
                    const theta = Math.random() * 2.0 * Math.PI;
                    const concentration = Math.pow(Math.random(), 3.0) * 0.4;
                    const phi = Math.PI / 2 + (Math.random() > 0.5 ? concentration : -concentration);
                    
                    const rawX = radius * Math.sin(phi) * Math.cos(theta);
                    const rawY = radius * Math.cos(phi); 
                    const rawZ = radius * Math.sin(phi) * Math.sin(theta);

                    const tilt = 35 * (Math.PI / 180);
                    x = rawX * Math.cos(tilt) - rawY * Math.sin(tilt);
                    y = rawX * Math.sin(tilt) + rawY * Math.cos(tilt);
                    z = rawZ;
                } else {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);
                    
                    x = radius * Math.sin(phi) * Math.cos(theta);
                    y = radius * Math.sin(phi) * Math.sin(theta);
                    z = radius * Math.cos(phi);
                }

                dummy.position.set(x, y, z);

                // 【极端大小层级算法】增加大量特小散点，大幅压缩大星星的尺寸
                const sizeRand = Math.random();
                let scale, brightness;
                
                if (sizeRand > 0.998) {
                    // 0.2% 主星：极大缩小尺寸，依靠辉光纹理产生视觉亮度
                    scale = 1.6 + Math.random() * 0.8; 
                    brightness = 1.0;
                } else if (sizeRand > 0.96) {
                    // 3.8% 一级亮星
                    scale = 0.8 + Math.random() * 0.6;
                    brightness = 0.9;
                } else if (sizeRand > 0.85) {
                    // 11% 普通星点
                    scale = 0.4 + Math.random() * 0.3;
                    brightness = 0.5 + Math.random() * 0.4;
                } else {
                    // 85% 极小微尘散点，尺寸被压低到极限，构成星云质感
                    scale = 0.15 + Math.random() * 0.2;
                    brightness = 0.2 + Math.random() * 0.4;
                }

                dummy.scale.set(scale, scale, scale);
                dummy.lookAt(0, 0, 0);
                dummy.updateMatrix();
                
                instancedMesh.setMatrixAt(i, dummy.matrix);
                
                const baseColorHex = starColors[Math.floor(Math.random() * starColors.length)];
                color.setHex(baseColorHex);
                color.r *= brightness;
                color.g *= brightness;
                color.b *= brightness;
                instancedMesh.setColorAt(i, color);

                starData.push({
                    color: color.clone(),
                    speed: 0.3 + Math.random() * 1.0, // 降低闪烁速度，使其显得更深邃
                    phase: Math.random() * Math.PI * 2 
                });
            }

            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
            scene.add(instancedMesh);
        }

        // ==========================================
        // 交互监听
        // ==========================================
        function initEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            container.addEventListener('pointerdown', (e) => {
                isPointerDown = true;
                pointerX = e.clientX;
                pointerY = e.clientY;
            });

            container.addEventListener('pointermove', (e) => {
                if (!isPointerDown) return;
                const deltaX = e.clientX - pointerX;
                const deltaY = e.clientY - pointerY;
                
                targetRotationY += deltaX * 0.0018;
                targetRotationX += deltaY * 0.0018;
                
                targetRotationX = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, targetRotationX));
                
                pointerX = e.clientX;
                pointerY = e.clientY;
            });

            window.addEventListener('pointerup', () => isPointerDown = false);
            window.addEventListener('pointercancel', () => isPointerDown = false);
        }

        function triggerQuote() {
            const randomQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            quoteElement.innerText = randomQuote;
            quoteElement.classList.add('show');
            setTimeout(() => { quoteElement.classList.remove('show'); }, 8000);
            setTimeout(triggerQuote, 25000);
        }

        // ==========================================
        // 渲染主循环
        // ==========================================
        const clock = new THREE.Clock();
        const workingColor = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            currentRotationX += (targetRotationX - currentRotationX) * CONFIG.interaction.damping;
            currentRotationY += (targetRotationY - currentRotationY) * CONFIG.interaction.damping;
            camera.quaternion.setFromEuler(new THREE.Euler(currentRotationX, currentRotationY, 0, 'YXZ'));

            if (instancedMesh && instancedMesh.instanceColor) {
                for (let i = 0; i < CONFIG.stars.count; i++) {
                    const data = starData[i];
                    // 使闪烁效果更加柔和，保留一半的基础亮度
                    const twinkle = 0.5 + 0.5 * Math.abs(Math.sin(time * data.speed + data.phase));
                    workingColor.copy(data.color).multiplyScalar(twinkle);
                    instancedMesh.setColorAt(i, workingColor);
                }
                instancedMesh.instanceColor.needsUpdate = true;
            }

            camera.fov = FIXED_FOV;
            camera.updateProjectionMatrix();

            if(Math.abs(targetRotationY - currentRotationY) > 0.0005) {
                const raHours = Math.floor(((currentRotationY % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) / (Math.PI * 2) * 24);
                const raMin = Math.floor(Math.abs(Math.sin(currentRotationY)) * 59);
                const decDeg = Math.floor((currentRotationX / (Math.PI / 2)) * 90);
                statusPanel.innerHTML = `
                    SYS.STATUS: ROTATING<br>
                    FOV: 55.00° (LOCKED)<br>
                    RA/DEC: ${raHours.toString().padStart(2, '0')}h ${raMin.toString().padStart(2, '0')}m / ${decDeg >= 0 ? '+' : ''}${decDeg}°
                `;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
